trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: AzureCLI@2
    displayName: 'What-If Preview'
    inputs:
      azureSubscription: 'sc-fonteyn-azure'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az deployment sub what-if \
          --name 'fonteyn-landing-zone' \
          --location 'germanywestcentral' \
          --template-file $(Build.SourcesDirectory)/main.bicep

  - task: AzureCLI@2
    displayName: 'Deploy Bicep Landing Zone'
    inputs:
      azureSubscription: 'sc-fonteyn-azure'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az deployment sub create \
          --name 'fonteyn-landing-zone' \
          --location 'germanywestcentral' \
          --template-file $(Build.SourcesDirectory)/main.bicep