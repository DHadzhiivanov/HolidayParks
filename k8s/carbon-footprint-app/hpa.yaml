apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carbon-footprint-app
  namespace: fonteyn-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carbon-footprint-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
