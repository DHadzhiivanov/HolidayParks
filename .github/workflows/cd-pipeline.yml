name: CD Pipeline - Build, Push and Deploy to AKS

on:
  push:
    branches:
      - Mohammed-dev
    paths:
      - "booking-app/**"
      - "carbon-footprint-app/**"
      - "k8s/**"
      - ".github/workflows/cd-pipeline.yml"

  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name acrfonteyn

      - name: Build and push Booking App image
        run: |
          docker build -t acrfonteyn.azurecr.io/booking-app:latest ./booking-app
          docker push acrfonteyn.azurecr.io/booking-app:latest

      - name: Build and push Carbon Footprint App image
        run: |
          docker build -t acrfonteyn.azurecr.io/carbon-footprint-app:latest ./carbon-footprint-app
          docker push acrfonteyn.azurecr.io/carbon-footprint-app:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-fonteyn-workloads-dev
          cluster-name: aks-fonteyn-dev

      - name: Create namespace if not exists
        run: |
          kubectl get namespace fonteyn-dev || kubectl create namespace fonteyn-dev

      - name: Deploy Booking App to AKS
        run: |
          kubectl apply -f k8s/booking-app/deployment.yaml
          kubectl apply -f k8s/booking-app/service.yaml
          kubectl apply -f k8s/booking-app/ingress.yaml
          kubectl apply -f k8s/booking-app/hpa.yaml

      - name: Deploy Carbon Footprint App to AKS
        run: |
          kubectl apply -f k8s/carbon-footprint-app/deployment.yaml
          kubectl apply -f k8s/carbon-footprint-app/service.yaml
          kubectl apply -f k8s/carbon-footprint-app/ingress.yaml
          kubectl apply -f k8s/carbon-footprint-app/hpa.yaml

      - name: Verify deployments
        run: |
          kubectl rollout status deployment/booking-app -n fonteyn-dev
          kubectl rollout status deployment/carbon-footprint-app -n fonteyn-dev